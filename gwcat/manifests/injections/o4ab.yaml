# Declarative manifest for the O4a+O4b injection/selection set.
#
# Ported verbatim from the pre-PR7 hardcoded registry in gwcat/fetch.py
# (INJECTION_RELEASES["injections-O4ab"] + _is_injection_hdf file filter).
release: injections-O4ab
observing_runs: [O4a, O4b]
description: "O4a+O4b-only search sensitivity (GWTC-5.0)"

records:
  - provider: zenodo
    record_id: 19500064
    concept_id: null

products:
  injections:
    file_patterns: ["*.hdf", "*.hdf5"]
    exclude_junk: true
    expected_event_count: null
    sample_set_policy: null

metadata:
  source_class_reference: not_applicable
  far_available_online: false
  preferred_waveform_source: manifest

validation:
  require_checksums: true
  allow_missing_far: true
