# Declarative manifest for GWTC-2.1.
#
# Ported verbatim from the pre-PR7 hardcoded registry in gwcat/fetch.py
# (RELEASES["GWTC-2.1"] + _is_gwtc21_cosmo file filter).
release: GWTC-2.1
observing_runs: [O1, O2, O3a]
description: "O1+O2+O3a cosmo PE samples (GWTC-2.1 v2)"

records:
  - provider: zenodo
    record_id: 6513631
    concept_id: 5117702

products:
  pe_samples:
    # GWTC-2.1 ships separate cosmo / nocosmo files per event; keep cosmo only.
    file_patterns: ["*_cosmo.h5"]
    contains_all: ["GWTC2p1"]
    suffix: "_cosmo.h5"
    exclude_patterns: ["*nocosmo*"]
    require_event_name: true
    expected_event_count: null
    sample_set_policy: null

metadata:
  source_class_reference: release_table
  far_available_online: true
  preferred_waveform_source: manifest

validation:
  require_checksums: true
  allow_missing_far: true
