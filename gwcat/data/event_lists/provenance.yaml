# Provenance for the bundled GWTC-5 BBH population event lists.
#
# These plain-text lists were previously hardcoded as Python literals in
# gwcat/bbh_allowed_names.py. They are the reproducible/offline population
# membership used when live GWOSC metadata are unavailable. Event names use
# the canonical timestamped form stored in the public PE files whenever one is
# available.
#
# The list is authoritative for population membership. It is not equivalent to
# reapplying the generic source-mass classifier to PE medians. The membership
# matches the official GWTC-5.0 population Event_list (GWTC5_BBH.txt +
# GWTC4.1_BBH.txt for O4, plus the GWTC-1/2.1/3 BBH tables for O1-O3), with the
# GW190814_211039 lower-mass-gap system excluded (arXiv:2605.27225).
#
# format: one canonical event name per line; blank lines and #-comments ignored.

schema_version: "1.1"

lists:
  bbh_o1o2.txt:
    observing_runs: [O1, O2]
    source: "GWTC-1 confident BBH detections."
    reference: "arXiv:1811.12907 (GWTC-1)"
    naming: "canonical timestamped PE/store names"
    count: 10
  bbh_o3a.txt:
    observing_runs: [O3a]
    source: "GWTC-2.1 / GWTC-3 population data-release BBH sample (GW190814_211039 excluded)."
    reference: "arXiv:2108.01045 (GWTC-2.1), arXiv:2111.03606 (GWTC-3)"
    filtered_by: non_bbh_exclusions.txt
    count: 36
  bbh_o3b.txt:
    observing_runs: [O3b]
    source: "GWTC-3 population data-release BBH/mass-gap sample."
    reference: "arXiv:2111.03606 (GWTC-3)"
    filtered_by: non_bbh_exclusions.txt
    count: 23
  bbh_o4a.txt:
    observing_runs: [O4a]
    source: "GWTC-4.1 population data release Event_list/GWTC4.1_BBH.txt."
    reference: "GWTC-4.1 population data release"
    filtered_by: non_bbh_exclusions.txt
    count: 86
  bbh_o4b.txt:
    observing_runs: [O4b]
    source: "GWTC-5.0 population data release Event_list/GWTC5_BBH.txt."
    reference: "arXiv:2605.27225 (GWTC-5.0, submitted 26 May 2026)"
    filtered_by: non_bbh_exclusions.txt
    count: 104

exclusions:
  non_bbh_exclusions.txt:
    purpose: >
      Names outside the authoritative 259-event GWTC-5 BBH population sample:
      established BNS/NSBH events plus the GW190814_211039 lower-mass-gap system
      (excluded from the BBH population analysis). GW240525_031210 is a confirmed
      O4b BBH in the official GWTC5_BBH.txt and is NOT excluded.
    reference: "GWTC-1..GWTC-5.0 population event tables"

# Aggregate expectations validated by
# gwcat.bbh_allowed_names.validate_bbh_allowed_names().
expected:
  bbh_all_total: 259
  o4b_non_excluded: 104
